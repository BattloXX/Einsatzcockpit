{% extends "base.html" %}
{% block title %}Neues Objekt – {{ brand }}{% endblock %}
{% block content %}
<div class="page-content" style="max-width:720px;">
  <div class="page-header">
    <div><h1>Neues Objekt</h1></div>
    <a href="/objekte/" class="btn btn--ghost">Zurück zur Liste</a>
  </div>

  <form method="post" action="/objekte/neu" class="card" style="padding:20px;">
    <input type="hidden" name="_csrf" value="{{ request.state.csrf_token }}">
    <div class="form-group">
      <label class="form-label">Name *</label>
      <input type="text" name="name" class="form-input" required maxlength="200" placeholder="z. B. Rattpack Werk 2">
    </div>
    <div class="form-group">
      <label class="form-label">Vulgoname / Alias</label>
      <input type="text" name="vulgoname" class="form-input" maxlength="200" placeholder="z. B. Altes Sägewerk">
    </div>
    <div class="form-group">
      <label class="form-label">Kategorie</label>
      <select name="kategorie_id" class="form-input">
        <option value="">– keine –</option>
        {% for k in kategorien %}
        <option value="{{ k.id }}">{{ k.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div style="display:grid;grid-template-columns:2fr 1fr;gap:12px;">
      <div class="form-group">
        <label class="form-label">Straße</label>
        <input type="text" name="strasse" class="form-input" maxlength="200">
      </div>
      <div class="form-group">
        <label class="form-label">Hausnummer</label>
        <input type="text" name="hausnummer" class="form-input" maxlength="20">
      </div>
    </div>
    <div style="display:grid;grid-template-columns:1fr 2fr;gap:12px;">
      <div class="form-group">
        <label class="form-label">PLZ</label>
        <input type="text" name="plz" class="form-input" maxlength="10">
      </div>
      <div class="form-group">
        <label class="form-label">Ort</label>
        <input type="text" name="ort" class="form-input" maxlength="100">
      </div>
    </div>
    <p class="form-hint">Koordinaten werden nach dem Anlegen automatisch aus der Adresse ermittelt (Geocoding).</p>
    <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:16px;">
      <a href="/objekte/" class="btn btn--ghost">Abbrechen</a>
      <button type="submit" class="btn btn--primary">Objekt anlegen</button>
    </div>
  </form>
</div>
{% endblock %}
