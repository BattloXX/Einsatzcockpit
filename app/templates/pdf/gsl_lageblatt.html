<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<style>
  @page { size: A4 portrait; margin: 14mm 12mm; }
  body { font-family: Helvetica, Arial, sans-serif; font-size: 10pt; color: #111; }
  .kopf { border-bottom: 3px solid #b71921; padding-bottom: 6px; margin-bottom: 10px; }
  h1 { font-size: 17pt; margin: 0; color: #b71921; }
  .meta { font-size: 9pt; color: #666; margin-top: 3px; }
  h2 { font-size: 11pt; margin: 10px 0 4px; padding: 2px 6px; background: #eee;
       border-left: 4px solid #b71921; }
  table.daten { width: 100%; border-collapse: collapse; }
  table.daten td { padding: 3px 4px; vertical-align: top; border-bottom: 0.5pt solid #ddd; }
  table.daten td.k { width: 30%; color: #555; font-size: 9pt; }
</style>
</head>
<body>
  <div class="kopf">
    <h1>&#x1F5FA; GSL-Lageblatt</h1>
    <div class="meta">
      {% if org %}{{ org.name }} · {% endif %}Stand: {{ now_str or '' }}
    </div>
  </div>

  <table class="daten">
    <tr><td class="k">Bezeichnung</td><td>{{ lage.name }}</td></tr>
    <tr><td class="k">Status</td>
        <td>{{ lage.status.name if lage.status else '' }}</td></tr>
    <tr><td class="k">Angelegt</td>
        <td>{{ lage.created_at.strftime('%d.%m.%Y %H:%M') if lage.created_at else '' }} (UTC)</td></tr>
  </table>
</body>
</html>
