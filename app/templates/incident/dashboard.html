<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dashboard · {{ incident.alarm_type_code }} – {{ incident.address_street or ('Einsatz #' ~ incident.id) }}</title>
  <link href="/static/css/fonts.css?v={{ ASSET_VERSION }}" rel="stylesheet">
  <style>
    /* ── Reset & Tokens ─────────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:              #0b1326;
      --surface:         #171f33;
      --surface-high:    #222a3d;
      --surface-highest: #2d3449;
      --border:          #2e3347;
      --border-soft:     rgba(46,51,71,.5);
      --text:            #dae2fd;
      --text-muted:      #7a87a8;
      --text-dim:        #5b6b8a;

      --green:    #18a957;
      --amber:    #f2b02e;
      --blue:     #1877f2;
      --red:      #d42225;
      --red-dark: #a5161a;

      --font-ui:   'Hanken Grotesk', Inter, 'Segoe UI', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'Consolas', ui-monospace, monospace;
    }

    /* Skalierbare Basisschrift – wächst mit der Viewport-Breite mit.
       Bei 1920px → ~15px, bei 1366px → ~10.7px, bei 2560px → 20px (max) */
    html {
      font-size: clamp(10px, 0.781vw, 20px);
    }

    html, body {
      width: 100%;
      height: 100dvh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-ui);
      font-size: 1rem;
      line-height: 1.4;
    }

    /* ── Layout shell ───────────────────────────────────────────────────────── */
    .shell {
      display: flex;
      flex-direction: column;
      height: 100dvh;
    }

    /* ── HEADER ─────────────────────────────────────────────────────────────── */
    {% set ac_pre = (incident.alarm_type_code or '')[:1]|lower %}
    .hdr {
      flex-shrink: 0;
      height: clamp(5.5rem, 10.2vh, 9rem);
      display: flex;
      align-items: stretch;
      border-bottom: 1px solid rgba(255,255,255,.1);
      box-shadow: 0 4px 24px rgba(0,0,0,.5);
      {% if ac_pre == 'f' %}
      background: #d42225;
      {% elif ac_pre == 't' %}
      background: linear-gradient(100deg, #1e3a8a 0%, #1d4ed8 55%, #1e3a8a 100%);
      {% else %}
      background: linear-gradient(100deg, #1e293b 0%, #334155 55%, #1e293b 100%);
      {% endif %}
    }

    .hdr-left {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 1.33rem;
      padding: 0 1.6rem;
      min-width: 0;
    }

    .alarm-badge {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      width: 5.6rem;
      height: 5rem;
      border-radius: .5rem;
      border: 2px solid rgba(255,255,255,.25);
      background: rgba(0,0,0,.25);
      font-family: var(--font-mono);
      font-size: 1.7rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: .04em;
    }

    .hdr-vsep {
      width: 1px;
      height: 4rem;
      background: rgba(255,255,255,.18);
      flex-shrink: 0;
    }

    .hdr-incident {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }
    .hdr-incident__label {
      font-family: var(--font-mono);
      font-size: .72rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: rgba(255,255,255,.6);
      margin-bottom: 3px;
    }
    .hdr-incident__title {
      font-size: 1.35rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-transform: uppercase;
      line-height: 1.2;
    }
    .hdr-incident__address {
      font-size: .95rem;
      color: rgba(255,255,255,.75);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .hdr-incident__address::before { content: '📍 '; }


    /* Right side: EL + Timer + Clock */
    .hdr-right {
      flex-shrink: 0;
      display: flex;
      align-items: stretch;
      border-left: 1px solid rgba(255,255,255,.12);
    }
    .hdr-block {
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: 0 1.47rem;
      border-right: 1px solid rgba(255,255,255,.12);
    }
    .hdr-block:last-child { border-right: none; }
    .hdr-block__label {
      font-family: var(--font-mono);
      font-size: .65rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: rgba(255,255,255,.5);
      margin-bottom: 3px;
    }
    .hdr-block__value {
      font-size: 1rem;
      font-weight: 600;
      color: #fff;
      white-space: nowrap;
    }
    .hdr-block__value--timer {
      font-family: var(--font-mono);
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: .04em;
    }
    .hdr-block__value--clock {
      font-family: var(--font-mono);
      font-size: 2.4rem;
      font-weight: 700;
      line-height: 1;
      letter-spacing: -.01em;
    }
    .hdr-block__sub {
      font-size: .72rem;
      color: rgba(255,255,255,.45);
      margin-top: 3px;
      font-family: var(--font-mono);
    }

    .status-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 10px;
      border-radius: 20px;
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      margin-top: 5px;
    }
    .status-pill--active   { background: rgba(24,169,87,.2);  border: 1px solid rgba(24,169,87,.4);  color: #5fcf8e; }
    .status-pill--exercise { background: rgba(242,176,46,.2); border: 1px solid rgba(242,176,46,.4); color: var(--amber); }
    .pulse-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
    .pulse-dot--green  { background: var(--green); animation: blink 2s ease-in-out infinite; }
    .pulse-dot--amber  { background: var(--amber); animation: blink 2s ease-in-out infinite; }
    .pulse-dot--gray   { background: var(--text-dim); }
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }
    .live-indicator {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .7rem; color: rgba(255,255,255,.45); font-family: var(--font-mono);
    }

    /* ── LAGE BAR (separate strip below header) ─────────────────────────────── */
    .lage-bar {
      flex-shrink: 0;
      height: clamp(2rem, 3.7vh, 3.2rem);
      background: rgba(120,53,15,.5);
      border-bottom: 1px solid rgba(217,119,6,.35);
      display: flex;
      align-items: center;
      gap: .67rem;
      padding: 0 1.47rem;
    }
    .lage-bar__icon { font-size: 1rem; flex-shrink: 0; }
    .lage-bar__label {
      font-family: var(--font-mono);
      font-size: .68rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: rgba(253,211,77,.7);
      flex-shrink: 0;
    }
    .lage-bar__sep { width: 1px; height: 16px; background: rgba(217,119,6,.4); flex-shrink: 0; }
    .lage-bar__text {
      font-size: .95rem;
      font-weight: 600;
      color: #fef08a;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      transition: opacity .35s ease;
    }

    /* ── MAIN GRID ──────────────────────────────────────────────────────────── */
    .main {
      flex: 1;
      min-height: 0;
      display: grid;
      grid-template-columns: 1.9fr 1.55fr 1.55fr;
      gap: .67rem;
      padding: .67rem;
    }

    /* ── PANELS ─────────────────────────────────────────────────────────────── */
    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .panel-hd {
      flex-shrink: 0;
      background: var(--surface-high);
      padding: .67rem 1.07rem;
      border-bottom: 1px solid var(--border);
    }
    .panel-hd__top {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 6px;
    }
    .panel-hd__title {
      font-family: var(--font-mono);
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 7px;
    }
    .panel-hd__icon { font-size: 1rem; }
    .panel-badge {
      font-family: var(--font-mono);
      font-size: .68rem;
      font-weight: 700;
      padding: 2px 8px;
      border-radius: 4px;
    }
    .panel-badge--green { background: rgba(24,169,87,.18); color: #5fcf8e; border: 1px solid rgba(24,169,87,.3); }
    .panel-badge--amber { background: rgba(242,176,46,.18); color: var(--amber); border: 1px solid rgba(242,176,46,.3); }

    .stat-row { display: flex; align-items: center; gap: 8px; }
    .chip {
      display: flex; align-items: center; gap: 7px;
      padding: 5px 10px; border-radius: 5px;
    }
    .chip-num {
      font-family: var(--font-mono);
      font-size: 1.7rem;
      font-weight: 700;
      line-height: 1;
    }
    .chip-lbl { font-size: .82rem; font-weight: 500; line-height: 1.2; }
    .chip--blue { background: rgba(24,119,242,.13); border: 1px solid rgba(24,119,242,.28); }
    .chip--blue .chip-num { color: #63a4f8; }
    .chip--blue .chip-lbl { color: rgba(99,164,248,.65); }
    .chip--green { background: rgba(24,169,87,.1); border: 1px solid rgba(24,169,87,.25); }
    .chip--green .chip-num { color: #5fcf8e; }
    .chip--green .chip-lbl { color: rgba(95,207,142,.65); }

    .progress-bar { height: 3px; background: rgba(255,255,255,.07); border-radius: 2px; margin-top: 8px; overflow: hidden; }
    .progress-fill { height: 100%; border-radius: 2px; background: linear-gradient(90deg,#18a957,rgba(24,169,87,.6)); transition: width .7s ease; }

    .panel-body {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: .53rem;
    }
    .panel-body::-webkit-scrollbar { width: 3px; }
    .panel-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── VEHICLES ───────────────────────────────────────────────────────────── */
    .section-label {
      font-family: var(--font-mono);
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .12em;
      padding: 5px 6px 4px;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .section-label__line { flex: 1; height: 1px; background: var(--border); }
    .section-label--green { color: var(--green); }
    .section-label--amber { color: var(--amber); }
    .section-label--gray  { color: var(--text-dim); }

    .vehicle-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(10.5rem, 1fr));
      gap: .47rem;
      padding: 0 .13rem .53rem;
    }
    .v-card {
      background: var(--surface-highest);
      border: 1px solid var(--border-soft);
      border-left: 4px solid transparent;
      border-radius: .4rem;
      padding: .67rem .8rem;
      display: flex;
      flex-direction: column;
      gap: .2rem;
    }
    .v-card--active   { border-left-color: var(--green); }
    .v-card--dispatch { border-left-color: var(--amber); }
    .v-card--other    { border-left-color: var(--text-dim); }

    .v-code { font-family: var(--font-mono); font-size: 1.25rem; font-weight: 700; color: #fff; line-height: 1.1; }
    .v-name { font-size: .82rem; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 1px; }
    .v-gk   { font-size: .88rem; font-weight: 500; color: var(--text); margin-top: .33rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .v-nogk { font-size: .8rem; color: var(--text-dim); font-style: italic; margin-top: .33rem; }

    .empty-panel {
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      height: 100%; min-height: 60px; gap: 7px;
      color: var(--text-dim); font-size: .88rem;
    }
    .empty-icon { font-size: 2rem; opacity: .4; }

    /* ── ITEM LIST (tasks / messages) ───────────────────────────────────────── */
    .item-list { display: flex; flex-direction: column; gap: 5px; }

    .item-row {
      display: flex; align-items: flex-start; gap: .67rem;
      background: var(--surface-highest);
      border: 1px solid var(--border-soft);
      border-radius: .4rem;
      padding: .67rem .8rem;
    }
    .item-row--done { opacity: .42; }

    .item-icon { font-size: 1.1rem; flex-shrink: 0; margin-top: 1px; }

    .item-body { flex: 1; min-width: 0; }
    .item-title {
      font-size: .95rem;
      font-weight: 600;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      line-height: 1.3;
    }
    .item-row--done .item-title { text-decoration: line-through; color: var(--text-muted); }
    .item-meta {
      margin-top: 3px;
      font-size: .8rem;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .v-badge {
      font-family: var(--font-mono);
      font-size: .72rem;
      font-weight: 700;
      padding: 1px 6px;
      border-radius: 3px;
      background: rgba(59,130,246,.18);
      border: 1px solid rgba(59,130,246,.3);
      color: #93c5fd;
    }
    .v-badge--msg {
      background: rgba(168,85,247,.18);
      border: 1px solid rgba(168,85,247,.3);
      color: #d8b4fe;
    }
    .unassigned { color: var(--text-dim); font-style: italic; }

    .divider {
      display: flex; align-items: center; gap: 8px;
      margin: 6px 0 4px;
    }
    .divider__line { flex: 1; height: 1px; background: rgba(255,255,255,.06); }
    .divider__text { font-family: var(--font-mono); font-size: .65rem; text-transform: uppercase; letter-spacing: .1em; color: var(--text-dim); }

    /* ── FOOTER (persons strip) ─────────────────────────────────────────────── */
    .footer {
      flex-shrink: 0;
      height: clamp(5rem, 8.9vh, 8rem);
      background: var(--surface-high);
      border-top: 1px solid var(--border);
      display: grid;
      grid-template-columns: repeat(3, 1fr);
    }
    .ps-group {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 1.2rem;
      padding: 0 1.33rem;
      border-right: 1px solid var(--border-soft);
      position: relative;
      overflow: hidden;
    }
    .ps-group:last-child { border-right: none; }
    .ps-group::before { content:''; position:absolute; top:0; left:0; right:0; height:3px; }
    .ps-group--found::before         { background: #60a5fa; }
    .ps-group--treated::before       { background: var(--amber); }
    .ps-group--transported::before   { background: var(--green); }

    .ps-icon   { font-size: 2.4rem; flex-shrink: 0; opacity: .7; }
    .ps-info   { display: flex; flex-direction: column; }
    .ps-label  { font-family: var(--font-mono); font-size: .68rem; text-transform: uppercase; letter-spacing: .1em; }
    .ps-count  { font-family: var(--font-mono); font-size: 3rem; font-weight: 700; line-height: 1; }
    .ps-names  { display: flex; flex-direction: column; gap: 1px; overflow: hidden; max-width: 130px; }
    .ps-name   { font-size: .8rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .ps-group--found       .ps-label, .ps-group--found       .ps-count { color: #63a4f8; }
    .ps-group--treated     .ps-label, .ps-group--treated     .ps-count { color: var(--amber); }
    .ps-group--transported .ps-label, .ps-group--transported .ps-count { color: #5fcf8e; }

    /* ── ATEMSCHUTZ-STRIP ───────────────────────────────────────────────────── */
    .bs-strip {
      flex-shrink: 0;
      background: rgba(120,20,20,.45);
      border-bottom: 1px solid rgba(248,113,113,.35);
      display: flex;
      align-items: center;
      gap: .53rem;
      padding: .4rem .8rem;
      overflow-x: auto;
      overflow-y: hidden;
    }
    .bs-strip::-webkit-scrollbar { height: 3px; }
    .bs-strip::-webkit-scrollbar-thumb { background: rgba(248,113,113,.35); border-radius: 2px; }

    .bs-strip__label {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: .4rem;
      font-family: var(--font-mono);
      font-size: .68rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: #fca5a5;
      padding-right: .67rem;
      border-right: 1px solid rgba(248,113,113,.3);
    }

    .bs-card {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: .67rem;
      background: rgba(0,0,0,.28);
      border: 1px solid rgba(248,113,113,.25);
      border-left: 3px solid transparent;
      border-radius: .4rem;
      padding: .3rem .67rem;
    }
    .bs-card--im_einsatz { border-left-color: #f97316; }
    .bs-card--rueckzug   { border-left-color: #ef4444; animation: bsPulse 1.4s ease-in-out infinite; }
    @keyframes bsPulse {
      0%,100% { border-left-color: #ef4444; background: rgba(0,0,0,.28); }
      50%      { border-left-color: #fca5a5; background: rgba(239,68,68,.12); }
    }

    .bs-info { display: flex; flex-direction: column; gap: 1px; }
    .bs-name {
      font-size: .88rem;
      font-weight: 700;
      color: #fff;
      white-space: nowrap;
    }
    .bs-unit {
      font-size: .72rem;
      color: rgba(255,255,255,.5);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 9rem;
    }

    .bs-metrics {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 2px;
    }
    .bs-press {
      font-family: var(--font-mono);
      font-size: 1.05rem;
      font-weight: 700;
      line-height: 1;
      white-space: nowrap;
    }
    .bs-press--ok   { color: #5fcf8e; }
    .bs-press--warn { color: var(--amber); }
    .bs-press--crit { color: #f87171; }
    .bs-press--none { color: rgba(255,255,255,.3); font-size: .78rem; font-style: italic; font-weight: 400; }

    .bs-time {
      font-family: var(--font-mono);
      font-size: .78rem;
      color: rgba(255,255,255,.55);
      white-space: nowrap;
    }

    /* ── LANE-GROUP: Fahrzeuge nach Abschnitt gruppiert (Dashboard-Fahrzeugpanel) ───── */
    .lane-group { margin-bottom: .53rem; }
    .lane-group:last-child { margin-bottom: 0; }
    .lane-group__head {
      display: flex;
      align-items: baseline;
      gap: 8px;
      padding: 3px 6px;
    }
    .lane-group__title {
      font-family: var(--font-mono);
      font-size: .72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text);
    }
    .lane-group__leader { font-size: .74rem; color: var(--amber); }
    .lane-group__leader--none { color: var(--text-dim); font-style: italic; }

    .bs-badge {
      font-family: var(--font-mono);
      font-size: .65rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      padding: 2px 7px;
      border-radius: 3px;
      white-space: nowrap;
    }
    .bs-badge--im_einsatz { background: rgba(242,176,46,.2); color: var(--amber); border: 1px solid rgba(242,176,46,.35); }
    .bs-badge--rueckzug   { background: rgba(216,48,48,.25); color: #f08080; border: 1px solid rgba(216,48,48,.4); }

    /* ── QR-Code im Header ── */
    .hdr-qr {
      flex-shrink: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 1.2rem;
      border-left: 1px solid rgba(255,255,255,.12);
      gap: .25rem;
    }
    .hdr-qr a {
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: .25rem;
    }
    .hdr-qr img {
      height: clamp(3.6rem, 7.5vh, 6.4rem);
      width: auto;
      border-radius: 5px;
      background: #fff;
      padding: 5px;
      display: block;
      transition: transform .15s ease;
    }
    .hdr-qr a:hover img { transform: scale(1.06); }
    .hdr-qr__label {
      font-family: var(--font-mono);
      font-size: .6rem;
      text-transform: uppercase;
      letter-spacing: .1em;
      color: rgba(255,255,255,.45);
      white-space: nowrap;
    }

    /* ── Status-Tags in Item-Rows ── */
    .status-tag {
      display: inline-flex;
      align-items: center;
      gap: 3px;
      font-size: .72rem;
      font-weight: 600;
      padding: 1px 7px;
      border-radius: 10px;
      white-space: nowrap;
    }
    .status-tag--open        { background: rgba(239,68,68,.15);  border: 1px solid rgba(239,68,68,.3);  color: #fca5a5; }
    .status-tag--in_progress { background: rgba(251,191,36,.15); border: 1px solid rgba(251,191,36,.3); color: #fde68a; }
    .status-tag--meldung     { background: rgba(239,68,68,.15);  border: 1px solid rgba(239,68,68,.3);  color: #fca5a5; }
    .status-tag--achtung     { background: rgba(249,115,22,.15); border: 1px solid rgba(249,115,22,.3); color: #fdba74; }
    .status-tag--hinweis     { background: rgba(234,179,8,.15);  border: 1px solid rgba(234,179,8,.3);  color: #fef08a; }
    .status-tag--information { background: rgba(59,130,246,.15); border: 1px solid rgba(59,130,246,.3); color: #93c5fd; }

    /* ── UAS-PANEL ──────────────────────────────────────────────────────────── */
    .uas-status-badge {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 2px 10px; border-radius: 4px;
      font-family: var(--font-mono); font-size: .68rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .08em;
    }
    .uas-status--alarmiert    { background: rgba(242,176,46,.18); border: 1px solid rgba(242,176,46,.35); color: var(--amber); }
    .uas-status--angemeldet   { background: rgba(24,119,242,.18); border: 1px solid rgba(24,119,242,.35); color: #63a4f8; }
    .uas-status--im_einsatz   { background: rgba(24,169,87,.18);  border: 1px solid rgba(24,169,87,.35);  color: #5fcf8e; }
    .uas-status--abgemeldet   { background: rgba(100,116,139,.18);border: 1px solid rgba(100,116,139,.35);color: #94a3b8; }
    .uas-status--abgeschlossen{ background: rgba(100,116,139,.18);border: 1px solid rgba(100,116,139,.35);color: #94a3b8; }

    .uas-role-row {
      display: flex; align-items: center; gap: .5rem;
      padding: .4rem .53rem;
      background: var(--surface-highest);
      border: 1px solid var(--border-soft);
      border-radius: .33rem;
      margin-bottom: .33rem;
    }
    .uas-role-tag {
      font-family: var(--font-mono); font-size: .65rem; font-weight: 700;
      text-transform: uppercase; letter-spacing: .06em;
      padding: 1px 6px; border-radius: 3px;
      background: rgba(120,80,220,.18); border: 1px solid rgba(120,80,220,.3); color: #c4b5fd;
      white-space: nowrap; flex-shrink: 0;
    }
    .uas-role-name { font-size: .88rem; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

    .uas-stat-row { display: flex; gap: .53rem; margin: .6rem 0; }
    .uas-stat {
      flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
      padding: .53rem .4rem;
      background: var(--surface-highest); border: 1px solid var(--border-soft); border-radius: .4rem;
    }
    .uas-stat__num { font-family: var(--font-mono); font-size: 1.6rem; font-weight: 700; line-height: 1; color: #c4b5fd; }
    .uas-stat__lbl { font-size: .72rem; color: var(--text-muted); margin-top: 3px; }

    .uas-link {
      display: flex; align-items: center; justify-content: center; gap: .4rem;
      margin-top: .6rem; padding: .5rem;
      background: rgba(120,80,220,.1); border: 1px solid rgba(120,80,220,.25);
      border-radius: .33rem; color: #c4b5fd;
      font-size: .82rem; font-weight: 600; text-decoration: none;
      transition: background .15s;
    }
    .uas-link:hover { background: rgba(120,80,220,.2); }

    .uas-info-row {
      display: flex; align-items: center; gap: .5rem;
      padding: .35rem .53rem;
      font-size: .82rem; color: var(--text-muted);
    }
    .uas-info-row strong { color: var(--text); }
  </style>
</head>
<body>
<div class="shell" id="dashBody">
{% include "incident/_dashboard_body.html" %}
</div><!-- /shell -->

<script>
  // ── Elapsed timer ─────────────────────────────────────────────────────
  // Elemente werden bei jedem WS-Swap ersetzt -> pro Tick frisch abfragen
  // statt Referenz einmalig zu cachen (sonst schreibt der Timer nach dem
  // ersten Swap in einen bereits aus dem DOM entfernten Knoten).
  const startTime = new Date('{{ started_at_iso }}');
  function pad(n) { return String(n).padStart(2, '0'); }
  function tickTimer() {
    const el = document.getElementById('elapsedTimer');
    if (!el) return;
    const s = Math.max(0, Math.floor((Date.now() - startTime) / 1000));
    el.textContent = `${pad(Math.floor(s/3600))}:${pad(Math.floor(s%3600/60))}:${pad(s%60)}`;
  }
  setInterval(tickTimer, 1000);
  tickTimer();

  // ── Wall clock ────────────────────────────────────────────────────────
  function tickClock() {
    const now = new Date();
    const timeEl = document.getElementById('clockTime');
    const dateEl = document.getElementById('clockDate');
    if (timeEl) timeEl.textContent = now.toLocaleTimeString('de-DE', { hour:'2-digit', minute:'2-digit', second:'2-digit', hour12:false });
    if (dateEl) dateEl.textContent = now.toLocaleDateString('de-DE', { weekday:'short', day:'2-digit', month:'long' });
  }
  setInterval(tickClock, 1000);
  tickClock();

  // ── Atemschutz-Trupptimer ─────────────────────────────────────────────
  // Ebenfalls pro Tick neu abfragen (Trupps können durch einen Swap
  // hinzukommen/verschwinden).
  function tickTroopTimers() {
    const now = Date.now();
    document.querySelectorAll('.bs-time[data-entry]').forEach(el => {
      const entry = new Date(el.dataset.entry).getTime();
      const planned = parseInt(el.dataset.planned || '0', 10);
      const s = Math.max(0, Math.floor((now - entry) / 1000));
      const h = Math.floor(s / 3600);
      const m = Math.floor(s % 3600 / 60);
      const sec = s % 60;
      const elapsed = h > 0
        ? `${pad(h)}:${pad(m)}:${pad(sec)}`
        : `${pad(m)}:${pad(sec)}`;
      el.textContent = planned > 0 ? `${elapsed} / ${planned} min` : elapsed;
      // Farbgebung: über Max = rot, über 2/3 = orange
      if (planned > 0) {
        const pct = s / (planned * 60);
        el.style.color = pct >= 1 ? '#e53e3e' : pct >= 0.67 ? '#ed8936' : '';
      }
    });
  }
  setInterval(tickTroopTimers, 1000);
  tickTroopTimers();

  // ── Lage-Ticker rotation ──────────────────────────────────────────────
  // Liest #lageHintsData (JSON-Insel im geswappten Fragment) statt eines
  // einmalig gebackenen JS-Arrays, damit nach jedem WS-Swap neue/aktuelle
  // Lagehinweise mitrotieren. Alter Interval wird vor Neustart gecleart.
  let lageTickerTimer = null;
  let lageTickerIdx = 0;
  function initLageTicker() {
    if (lageTickerTimer) { clearInterval(lageTickerTimer); lageTickerTimer = null; }
    lageTickerIdx = 0;
    const dataEl = document.getElementById('lageHintsData');
    if (!dataEl) return;
    let hints = [], hintsAI = [];
    try {
      const parsed = JSON.parse(dataEl.textContent);
      hints = parsed.hints || [];
      hintsAI = parsed.hintsAI || [];
    } catch (_) { return; }
    if (hints.length <= 1) return;
    lageTickerTimer = setInterval(() => {
      const ticker = document.getElementById('lageTicker');
      const barIcon = document.getElementById('lageBarIcon');
      if (!ticker) return;
      lageTickerIdx = (lageTickerIdx + 1) % hints.length;
      ticker.style.opacity = '0';
      setTimeout(() => {
        ticker.textContent = hints[lageTickerIdx];
        if (barIcon) barIcon.textContent = hintsAI[lageTickerIdx] ? '✨' : '📢';
        ticker.style.opacity = '1';
      }, 380);
    }, 8000);
  }
  initLageTicker();

  // ── Live-Updates via WebSocket (ersetzt den zeitgesteuerten Reload) ────
  const incidentId = {{ incident.id }};
  let ws;
  let dashRefreshTimer = null;

  function setLive(connected) {
    const dot = document.getElementById('wsLiveDot');
    const label = document.getElementById('wsLiveLabel');
    if (dot) dot.className = 'pulse-dot ' + (connected ? 'pulse-dot--green' : 'pulse-dot--gray');
    if (label) label.textContent = connected ? 'Live' : 'Getrennt …';
  }

  function refreshDashboard() {
    fetch('/einsatz/' + incidentId + '/dashboard/inhalt', { credentials: 'same-origin' })
      .then(r => { if (!r.ok) throw new Error('http ' + r.status); return r.text(); })
      .then(html => {
        const target = document.getElementById('dashBody');
        if (target) target.innerHTML = html;
        initLageTicker();
        setLive(!!ws && ws.readyState === 1);
      })
      .catch(() => {});
  }

  function scheduleDashboardRefresh() {
    // Debounce: mehrere Events kurz hintereinander (z.B. mehrere Karten
    // gleichzeitig verschoben) lösen nur einen Swap aus.
    clearTimeout(dashRefreshTimer);
    dashRefreshTimer = setTimeout(refreshDashboard, 350);
  }

  function connectWs() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host + '/ws/incident/' + incidentId);
    ws.onopen = function () { setLive(true); refreshDashboard(); };
    ws.onmessage = function (e) {
      try {
        const msg = JSON.parse(e.data);
        if (msg.type === 'incident_closed') { location.href = '/'; return; }
        if (msg.type === 'ping') { ws.send(JSON.stringify({ type: 'pong' })); return; }
        scheduleDashboardRefresh();
      } catch (_) {}
    };
    ws.onclose = function () { setLive(false); setTimeout(connectWs, 3000); };
  }
  connectWs();

  // Safety-Refresh: falls trotz WS mal ein Event verloren geht, holt dieser
  // stille Fragment-Refresh (kein Full-Reload) den aktuellen Stand nach.
  setInterval(refreshDashboard, 5 * 60 * 1000);
</script>
</body>
</html>
