{# Alarmstufe / Einsatzgrund bearbeiten — HTMX-Fragment (Ziel: #cardDetailBody) #}
<div class="modal__header">
  <div>
    <div class="modal__title">Alarmstufe &amp; Einsatzgrund</div>
    <div class="modal__subtitle">Einsatz #{{ incident.id }}</div>
  </div>
  <button class="modal__close" onclick="document.getElementById('cardDetailModal').close()">✕</button>
</div>
<div class="modal__body">
  <form hx-post="/einsatz/{{ incident.id }}/alarm"
        hx-target="#cardDetailBody"
        hx-swap="innerHTML">
    <input type="hidden" name="_csrf" value="{{ request.state.csrf_token }}">

    <div class="form-group" style="margin-bottom:1rem">
      <label class="form-label">Alarmstufe</label>
      <select name="alarm_type_code" class="form-input">
        {% for at in alarm_types %}
        <option value="{{ at.code }}" {% if at.code == incident.alarm_type_code %}selected{% endif %}>
          {{ at.code }}{% if at.label %} – {{ at.label }}{% endif %}
        </option>
        {% endfor %}
      </select>
    </div>

    <div class="form-group" style="margin-bottom:1.5rem">
      <label class="form-label">Einsatzgrund / Meldung</label>
      <textarea name="report_text" class="form-input" rows="3"
                placeholder="Kurze Beschreibung des Einsatzes…">{{ (incident.reason or incident.report_text or '') }}</textarea>
    </div>

    <div class="modal__footer">
      <button type="button" class="btn btn--ghost"
              onclick="document.getElementById('cardDetailModal').close()">Abbrechen</button>
      <button type="submit" class="btn btn--primary">Speichern</button>
    </div>
  </form>
</div>
