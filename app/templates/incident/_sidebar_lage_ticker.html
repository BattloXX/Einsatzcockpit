{# KI-Lagehinweis-Ticker in der Sidebar. Variablen: lage_hints, lage_hints_ai, oob (optional) #}
<div class="lage-ticker" id="lageTicker" {% if oob %}hx-swap-oob="true"{% endif %}
     x-data='lageTicker({{ lage_hints|map(attribute="text")|list|tojson }}, {{ lage_hints_ai|tojson }})'>
  <span class="lage-ticker__icon" x-text="currentIsAI ? '✨' : 'ℹ'"></span>
  <span class="lage-ticker__text" x-text="currentHint"></span>
</div>
