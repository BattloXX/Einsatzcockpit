{# HTMX-Fragment: Abzugs-Bestätigung für Vor-Ort-Konflikt #}
<div id="dispatch-confirm-wrap-{{ einheit.id }}" class="dispatch-conflict-box">
  <div class="dispatch-conflict-box__title">
    ⚠ {{ einheit.label }} ist bereits bei
    <strong>{{ conflict_site.bezeichnung }}</strong> vor Ort.
    Abziehen und zu <strong>{{ site.bezeichnung }}</strong> verlegen?
  </div>
  <div style="display:flex;gap:6px;flex-wrap:wrap;">
    <form hx-post="/lage/{{ lage.id }}/stellen/{{ site.id }}/einheit-vor-ort"
          hx-swap="none"
          hx-on::after-request="if(event.detail.successful){
            htmx.ajax('GET','/lage/{{ lage.id }}/stellen/{{ site.id }}',{target:'#siteDetailContent',swap:'innerHTML'});
            htmx.ajax('GET','/lage/{{ lage.id }}/stellen/{{ site.id }}/card',{target:'[data-site-id=\'{{ site.id }}\']',swap:'outerHTML'});
            htmx.ajax('GET','/lage/{{ lage.id }}/stellen/{{ conflict_site.id }}/card',{target:'[data-site-id=\'{{ conflict_site.id }}\']',swap:'outerHTML'});
          }">
      <input type="hidden" name="_csrf" value="{{ request.state.csrf_token }}">
      <input type="hidden" name="einheit_id" value="{{ einheit.id }}">
      <input type="hidden" name="confirmed" value="true">
      <button type="submit" class="btn btn--xs btn--warn">Ja, verlegen</button>
    </form>
    <button type="button" class="btn btn--xs btn--ghost"
            hx-get="/lage/{{ lage.id }}/stellen/{{ site.id }}"
            hx-target="#siteDetailContent"
            hx-swap="innerHTML">
      Abbrechen
    </button>
  </div>
</div>
