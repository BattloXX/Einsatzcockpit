{% extends "incident_major/_lage_layout.html" %}
{% block title %}{{ lage.name }} – Abschnitte{% endblock %}

{% block head_extra %}
<style>
.sk-wrap { padding: 16px; max-width: 1280px; margin: 0 auto; }
.sk-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 14px; }

.sk-card {
  background: var(--surface-mid);
  border: 1px solid var(--border); border-left: 3px solid var(--sk-accent, var(--border));
  border-radius: var(--radius-lg, .75rem);
  overflow: hidden; transition: transform .12s, box-shadow .12s;
}
.sk-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-card); }
.sk-card__header {
  display: flex; align-items: center; gap: 9px;
  padding: 10px 14px;
  background: rgba(255,255,255,.03);
  border-bottom: 1px solid var(--border);
}
.sk-card__dot { width: 13px; height: 13px; border-radius: 50%; flex-shrink: 0; }
.sk-card__title { font-weight: 700; font-size: .88rem; flex: 1; }
.sk-card__leader { font-size: .7rem; color: var(--text-muted); font-family: 'JetBrains Mono', monospace; margin-top: 1px; }
.sk-card__count {
  font-size: .68rem; font-weight: 700; background: var(--surface-high); color: var(--text-muted);
  border-radius: 999px; padding: 2px 9px; font-family: 'JetBrains Mono', monospace;
}
.sk-card__body { padding: 10px 14px; }
.sk-site {
  font-size: .8rem; padding: 6px 9px; margin-bottom: 4px; border-radius: var(--radius-md, .5rem);
  background: var(--surface-high); display: flex; align-items: center; gap: 7px;
}
.sk-site:last-child { margin-bottom: 0; }
.sk-empty { font-size: .78rem; color: var(--text-muted); padding: 6px 0; font-style: italic; }

.sk-card__footer { padding: 9px 14px; border-top: 1px solid var(--border);
  display: flex; gap: 6px; align-items: center; }

/* New sector card */
.sk-add { border-style: dashed; border-left-style: solid; }
.sk-add .sk-card__header { background: rgba(255,255,255,.02); }

/* Color swatches */
.color-swatches { display: flex; gap: 6px; flex-wrap: wrap; }
.color-swatch {
  width: 22px; height: 22px; border-radius: 50%; cursor: pointer;
  border: 2px solid transparent; flex-shrink: 0; transition: border-color .12s;
}
.color-swatch:hover, .color-swatch.selected { border-color: var(--text); }

/* Bearbeiten-Modal */
.sk-modal { background: var(--surface-mid); border: 1px solid var(--border);
  border-radius: var(--radius-lg, .75rem); padding: 16px; min-width: 300px; }
.sk-modal::backdrop { background: rgba(0,0,0,.6); }
.sk-modal h3 { font-size: .9rem; margin-bottom: 12px; }
</style>
{% endblock %}

{% block lage_content %}
<div class="sk-wrap">
  <div class="sk-grid" id="sektorenGrid">
    {% include "incident_major/_sektoren_grid.html" %}
  </div>
</div>
{% endblock %}
