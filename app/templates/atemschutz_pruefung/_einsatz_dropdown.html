{# Partial: Einsatz-Dropdown der letzten 3 Tage (HTMX-Nachladen, analog Fahrtenbuch) #}
<div class="form-group">
  <label class="form-label" for="incident_id">Einsatz *</label>
  <select name="incident_id" id="incident_id" class="form-control form-control--lg" required>
    <option value="">— Einsatz wählen —</option>
    {% for inc in incidents %}
    <option value="{{ inc.id }}">
      #{{ inc.id }} – {{ inc.alarm_type_code }}
      {%- if inc.address_street %} – {{ inc.address_street }} {{ inc.address_no or '' }}{% endif %}
      ({{ inc.started_at|local_datetime }})
    </option>
    {% else %}
    <option value="" disabled>Kein Einsatz der letzten 3 Tage gefunden</option>
    {% endfor %}
  </select>
</div>
