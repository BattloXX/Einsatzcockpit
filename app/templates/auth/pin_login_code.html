<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#d42225">
  <title>PIN eingeben – {{ brand }}</title>
  <link rel="stylesheet" href="/static/css/app.css">
  <link rel="icon" type="image/x-icon" href="/static/img/favicon.ico">
  <script src="/static/js/csrf.js" defer></script>
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card">
      <div class="login-logo">
        <img src="/static/img/logo_einsatzcockpit.png" alt="{{ brand }}" onerror="this.style.display='none'" class="login-logo__img">
        <h1 class="login-logo__title" style="font-size:1.15rem;margin-top:4px">PIN eingeben</h1>
        <p class="login-logo__sub">Wenn die Nummer registriert ist, hast du soeben eine SMS mit dem PIN erhalten.</p>
      </div>

      {% if error %}
      <div class="alert alert--error">{{ error }}</div>
      {% endif %}

      <form method="post" action="/pin-login/code" class="login-form">
        <input type="hidden" name="_csrf" value="{{ request.state.csrf_token }}">
        <input type="hidden" name="phone" value="{{ phone }}">
        <div class="form-group">
          <label for="pin">PIN</label>
          <input type="text" id="pin" name="pin" required
                 inputmode="numeric" pattern="[0-9]*" maxlength="6"
                 autocomplete="one-time-code" class="form-input"
                 placeholder="••••••" autofocus
                 style="letter-spacing:.3em; text-align:center; font-size:1.4rem;">
        </div>
        <div class="form-group">
          <label style="display:flex;align-items:center;gap:8px;font-weight:400;">
            <input type="checkbox" name="remember" value="1" style="width:auto;">
            Angemeldet bleiben (30 Tage)
          </label>
        </div>
        <button type="submit" class="btn btn--primary btn--full">Anmelden</button>
      </form>
      <div style="text-align:center; margin-top:14px;">
        <a href="/pin-login" class="link-sm">← andere Nummer / neuen PIN anfordern</a>
      </div>
    </div>
  </div>
</body>
</html>
