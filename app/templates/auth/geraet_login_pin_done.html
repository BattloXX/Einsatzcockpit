<!DOCTYPE html>
<html lang="de" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#d42225">
  <title>Angemeldet – {{ brand }}</title>
  <link rel="stylesheet" href="/static/css/app.css">
</head>
<body class="login-body">
  <div class="login-container">
    <div class="login-card" style="text-align:center;">
      <div class="login-logo">
        <img src="/static/img/logo_einsatzcockpit.png" alt="{{ brand }}"
             onerror="this.style.display='none'" class="login-logo__img">
      </div>
      <p style="margin:16px 0; font-size:1.05rem; font-weight:600;">Anmeldung erfolgreich…</p>
    </div>
  </div>

  <script>
    // Capacitor injiziert seine JS-Bruecke NICHT in Seiten, die per
    // server.allowNavigation extern (Cross-Origin) nachgeladen werden — das ist
    // eine bekannte Capacitor-Einschraenkung (kein Timing-Problem, die Bruecke
    // kommt hier nie an), siehe ionic-team/capacitor#7454. Ein direkter
    // Preferences.set()-Aufruf von dieser Seite aus funktioniert daher nie
    // zuverlaessig (Bug: PIN-Login "vergisst" sich nach App-Neustart, obwohl die
    // Weiterleitung noch klappte, weil die Web-Session-Cookie unabhaengig davon
    // gesetzt wird).
    //
    // Kommt die App her (request.state.is_native_app, serverseitig per
    // ec_native-Cookie erkannt — siehe session_middleware in main.py), wird
    // stattdessen auf die LOKALE index.html zurueckgeleitet (garantierter
    // Bridge-Zugriff, wie beim QR-Scan) und der frische Geraete-Token per
    // Query-Param mitgegeben; die dortige Boot-Logik speichert ihn dann
    // zuverlaessig in den Capacitor-Preferences. Im normalen Browser reicht
    // die Session-Cookie allein aus.
    var rawToken = {{ raw_token|tojson }};
    var isNativeApp = {{ request.state.is_native_app|tojson }};
    if (isNativeApp) {
      window.location.replace('https://localhost/index.html?pin_device_token=' + encodeURIComponent(rawToken));
    } else {
      window.location.replace('/');
    }
  </script>
</body>
</html>
